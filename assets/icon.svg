<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b8eff"/>
      <stop offset="100%" stop-color="#7b68ee"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Outer ring (track) -->
  <circle cx="512" cy="480" r="280" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="56"/>

  <!-- Progress arc 100% (full circle) -->
  <circle cx="512" cy="480" r="280" fill="none"
    stroke="url(#arc)" stroke-width="56"
    stroke-linecap="round"/>

  <!-- Green dot center -->
  <circle cx="512" cy="480" r="68" fill="#4ade80"/>

  <!-- Bottom bar -->
  <rect x="212" y="830" width="600" height="26" rx="13" fill="rgba(255,255,255,0.07)"/>
  <rect x="212" y="830" width="600" height="26" rx="13" fill="url(#bar)"/>
</svg>
